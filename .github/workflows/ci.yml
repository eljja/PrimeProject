name: PrimeProject CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: ${{ github.workspace }}

jobs:
  publication-guard:
    name: Publication Guard
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Compile Python sources
        run: python -m compileall prime_audit scripts tests

      - name: Run publication-critical unit checks
        run: >
          python -m unittest
          tests.test_prime_audit.PrimeAuditTests.test_publication_consistency_checks_claim_boundaries
          tests.test_prime_audit.PrimeAuditTests.test_publication_consistency_fails_on_mixed_artifact_vintages
          tests.test_prime_audit.PrimeAuditTests.test_project_evolution_metrics_match_public_artifacts
          tests.test_prime_audit.PrimeAuditTests.test_public_evidence_pack_hashes_match_files
          tests.test_prime_audit.PrimeAuditTests.test_public_artifact_lineage_matches_current_default_graph
          tests.test_prime_audit.PrimeAuditTests.test_publication_reproduction_script_succeeds

      - name: Reproduce publication artifacts
        run: python scripts/reproduce_publication.py

      - name: Install Playwright
        run: |
          npm install --no-save --no-package-lock playwright
          npx playwright install chromium

      - name: Check JavaScript syntax
        run: |
          node --check assets/app.js
          node --check scripts/verify_pages.cjs

      - name: Verify GitHub Pages surface
        run: node scripts/verify_pages.cjs

      - name: Ensure committed artifacts stay in sync
        run: git diff --exit-code -- .
