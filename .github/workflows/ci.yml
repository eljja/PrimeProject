name: PrimeProject CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: ${{ github.workspace }}

jobs:
  publication-guard:
    name: Publication Guard
    runs-on: windows-2025-vs2026
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Compile Python sources
        run: python -m compileall prime_audit scripts tests

      - name: Unit check publication consistency
        run: python -m unittest tests.test_prime_audit.PrimeAuditTests.test_publication_consistency_checks_claim_boundaries

      - name: Unit check artifact vintages
        run: python -m unittest tests.test_prime_audit.PrimeAuditTests.test_publication_consistency_fails_on_mixed_artifact_vintages

      - name: Unit check evolution metrics
        run: python -m unittest tests.test_prime_audit.PrimeAuditTests.test_project_evolution_metrics_match_public_artifacts

      - name: Unit check evidence hashes
        run: python -m unittest tests.test_prime_audit.PrimeAuditTests.test_public_evidence_pack_hashes_match_files

      - name: Unit check artifact lineage
        run: python -m unittest tests.test_prime_audit.PrimeAuditTests.test_public_artifact_lineage_matches_current_default_graph

      - name: Unit check publication reproduction
        run: python -m unittest tests.test_prime_audit.PrimeAuditTests.test_publication_reproduction_script_succeeds

      - name: Unit check latest registered holdout
        run: python -m unittest tests.test_ticket119_twin_canonical_pair_doubling_preregistration

      - name: Verify open problem structure
        run: python scripts/verify_open_problem_structure.py

      - name: Verify open problem certificates
        run: python scripts/verify_open_problem_workbench.py

      - name: Reproduce publication artifacts
        run: python scripts/reproduce_publication.py

      - name: Install Playwright
        run: |
          npm install --no-save --no-package-lock playwright
          npx playwright install chromium

      - name: Check JavaScript syntax
        run: |
          node --check assets/app.js
          node --check assets/open-problems.js
          node --check scripts/verify_pages.cjs

      - name: Verify GitHub Pages surface
        run: node scripts/verify_pages.cjs

      - name: Ensure committed artifacts stay in sync
        run: git diff --exit-code -- .
